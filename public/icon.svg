<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Anvil -->
  <g transform="translate(256, 300)" fill="rgba(255,255,255,0.95)">
    <!-- Anvil base -->
    <polygon points="-90,40 -110,80 110,80 90,40"/>
    <!-- Anvil body -->
    <polygon points="-80,40 -70,-10 -100,-10 -120,-30 -120,-50 -100,-50 -60,-30 60,-30 80,-50 100,-50 100,-10 70,-10 80,40"/>
    <!-- Anvil top highlight -->
    <polygon points="-60,-30 60,-30 80,-50 -100,-50 -120,-30" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- Hammer -->
  <g transform="translate(256, 160) rotate(-22)" fill="rgba(255,255,255,0.95)">
    <!-- Handle -->
    <rect x="-6" y="-20" width="12" height="120" rx="4"/>
    <!-- Head -->
    <rect x="-42" y="-44" width="84" height="44" rx="6"/>
    <!-- Head highlight -->
    <rect x="-42" y="-44" width="84" height="14" rx="6" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Sparks -->
  <g fill="rgba(255,255,255,0.8)">
    <!-- 4-point star spark 1 -->
    <polygon points="144,113 148,105 152,113 148,121" />
    <polygon points="140,109 148,105 156,109 148,113" />
    <!-- 4-point star spark 2 -->
    <polygon points="369,92 372,86 375,92 372,98" />
    <polygon points="366,89 372,86 378,89 372,92" />
    <!-- 4-point star spark 3 -->
    <polygon points="400,164 402,159 404,164 402,169" />
    <polygon points="397,161 402,159 407,161 402,164" />
    <!-- Dots -->
    <circle cx="113" cy="179" r="4"/>
    <circle cx="420" cy="128" r="3"/>
  </g>
</svg>
